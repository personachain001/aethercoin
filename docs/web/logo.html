<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>KryoMine Logo Generator</title>
<style>
body { 
    display: flex; 
    justify-content: center; 
    align-items: center; 
    min-height: 100vh; 
    background: #1a1a2e; 
    margin: 0;
    flex-direction: column;
    gap: 40px;
}
.logo-container {
    display: flex;
    gap: 40px;
    align-items: center;
}
.info {
    color: #aaa;
    font-family: monospace;
    text-align: center;
}
</style>
</head>
<body>
<div class="logo-container">
<!-- Logo 512x512 -->
<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a8edea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fed6e3;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#grad1)" filter="url(#shadow)"/>
  <!-- Inner ring -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="url(#grad2)" stroke-width="3" opacity="0.6"/>
  <!-- Orbital rings -->
  <ellipse cx="256" cy="256" rx="160" ry="60" fill="none" stroke="url(#grad2)" stroke-width="2.5" opacity="0.7" transform="rotate(-30, 256, 256)"/>
  <ellipse cx="256" cy="256" rx="160" ry="60" fill="none" stroke="url(#grad2)" stroke-width="2.5" opacity="0.7" transform="rotate(30, 256, 256)"/>
  <ellipse cx="256" cy="256" rx="160" ry="60" fill="none" stroke="url(#grad2)" stroke-width="2.5" opacity="0.7" transform="rotate(90, 256, 256)"/>
  <!-- Central atom/nucleus -->
  <circle cx="256" cy="256" r="35" fill="url(#grad2)"/>
  <circle cx="256" cy="256" r="20" fill="#fff" opacity="0.9"/>
  <!-- Electron dots on orbits -->
  <circle cx="386" cy="206" r="10" fill="#fff" opacity="0.9"/>
  <circle cx="126" cy="306" r="10" fill="#fff" opacity="0.9"/>
  <circle cx="256" cy="96" r="10" fill="#fff" opacity="0.9"/>
  <!-- Text A -->
  <text x="256" y="450" text-anchor="middle" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="url(#grad2)" letter-spacing="8">KRYO</text>
</svg>

<!-- Logo 256x256 -->
<svg width="256" height="256" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1b" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2b" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a8edea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fed6e3;stop-opacity:1" />
    </linearGradient>
  </defs>
  <circle cx="256" cy="256" r="240" fill="url(#grad1b)"/>
  <ellipse cx="256" cy="256" rx="160" ry="60" fill="none" stroke="url(#grad2b)" stroke-width="3" opacity="0.7" transform="rotate(-30, 256, 256)"/>
  <ellipse cx="256" cy="256" rx="160" ry="60" fill="none" stroke="url(#grad2b)" stroke-width="3" opacity="0.7" transform="rotate(30, 256, 256)"/>
  <ellipse cx="256" cy="256" rx="160" ry="60" fill="none" stroke="url(#grad2b)" stroke-width="3" opacity="0.7" transform="rotate(90, 256, 256)"/>
  <circle cx="256" cy="256" r="35" fill="url(#grad2b)"/>
  <circle cx="256" cy="256" r="20" fill="#fff" opacity="0.9"/>
  <circle cx="386" cy="206" r="10" fill="#fff" opacity="0.9"/>
  <circle cx="126" cy="306" r="10" fill="#fff" opacity="0.9"/>
  <circle cx="256" cy="96" r="10" fill="#fff" opacity="0.9"/>
</svg>
</div>
<div class="info">
  Logo: 512x512 (left) and 256x256 (right)<br>
  Right-click → Save Image As... to download
</div>
</body>
</html>
