<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KryoMine Wallet</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .container { max-width: 500px; padding: 40px; }
        h1 { font-size: 32px; margin-bottom: 16px; }
        h1 span { color: #00d4ff; }
        .status {
            background: rgba(255,193,7,0.15);
            border: 1px solid rgba(255,193,7,0.3);
            color: #ffc107;
            padding: 20px;
            border-radius: 8px;
            margin: 24px 0;
        }
        p { color: #aaa; line-height: 1.8; }
        code { background: rgba(255,255,255,0.1); padding: 2px 6px; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="container">
        <h1><span>KryoMine</span> Wallet</h1>
        <div class="status">
            <strong>🚧 Coming Soon</strong><br>
            Web wallet is planned for a future release.
        </div>
        <p>
            For now, use the CLI wallet:
            <br><code style="color:#00d4ff">python3 src/cli.py wallet create</code>
        </p>
    </div>
</body>
</html>
